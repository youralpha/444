<!DOCTYPE html>
<html>
<head>
<style>
@keyframes slideUp {
    from { opacity: 0; transform: translate(-50%, -40%) scale(0.98); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
.animate-in { animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
</style>
</head>
<body></body>
</html>
