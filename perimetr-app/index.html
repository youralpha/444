<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PERIMETR App</title>
  </head>
  <body class="bg-tactical-900 text-tactical-text font-sans flex min-h-screen m-0 overflow-hidden" x-data="{ currentModule: 'dashboard' }">

    <!-- Sidebar -->
    <aside class="w-64 bg-tactical-800 border-r border-tactical-700 flex flex-col h-screen shrink-0">
      <div class="p-6 border-b border-tactical-700">
        <h1 class="text-2xl font-bold font-mono tracking-widest text-tactical-accent uppercase">PERIMETR</h1>
        <p class="text-xs text-gray-400 mt-1 uppercase tracking-wider">Tactical OS</p>
      </div>

      <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
        <button
          @click="currentModule = 'dashboard'"
          :class="currentModule === 'dashboard' ? 'bg-tactical-700 border-l-2 border-tactical-accent text-tactical-accent' : 'text-gray-300 hover:bg-tactical-700 hover:text-white'"
          class="w-full flex items-center gap-3 p-3 text-left transition-colors font-medium text-sm rounded-r"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          Дашборд
        </button>

        <button
          @click="currentModule = 'kpt'"
          :class="currentModule === 'kpt' ? 'bg-tactical-700 border-l-2 border-tactical-accent text-tactical-accent' : 'text-gray-300 hover:bg-tactical-700 hover:text-white'"
          class="w-full flex items-center gap-3 p-3 text-left transition-colors font-medium text-sm rounded-r"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
          КПТ Протокол
        </button>

        <button
          @click="currentModule = 'base'"
          :class="currentModule === 'base' ? 'bg-tactical-700 border-l-2 border-tactical-accent text-tactical-accent' : 'text-gray-300 hover:bg-tactical-700 hover:text-white'"
          class="w-full flex items-center gap-3 p-3 text-left transition-colors font-medium text-sm rounded-r"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          Base Таймер
        </button>

        <button
          @click="currentModule = 'knowledge'"
          :class="currentModule === 'knowledge' ? 'bg-tactical-700 border-l-2 border-tactical-accent text-tactical-accent' : 'text-gray-300 hover:bg-tactical-700 hover:text-white'"
          class="w-full flex items-center gap-3 p-3 text-left transition-colors font-medium text-sm rounded-r mt-4 border-t border-tactical-700 pt-4"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
          База Знаний (DOCX)
        </button>
      </nav>

      <div class="p-4 border-t border-tactical-700 flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-tactical-accent animate-pulse"></div>
        <span class="text-xs text-gray-400 uppercase tracking-widest font-mono">System Online</span>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 relative h-screen bg-tactical-900">

      <iframe
        x-show="currentModule === 'dashboard'"
        src="/PERIMETR.html"
        class="w-full h-full border-none absolute inset-0"
        title="Dashboard"
      ></iframe>

      <iframe
        x-show="currentModule === 'kpt'"
        src="/KPT.html"
        class="w-full h-full border-none absolute inset-0"
        title="KPT Protocol"
      ></iframe>

      <iframe
        x-show="currentModule === 'base'"
        src="/BASE.html"
        class="w-full h-full border-none absolute inset-0"
        title="Base Timer"
      ></iframe>

      <iframe
        x-show="currentModule === 'knowledge'"
        src="/knowledge.html"
        class="w-full h-full border-none absolute inset-0 bg-tactical-900"
        title="Knowledge Base"
      ></iframe>

    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
